name: enhanced
display_name: Enhanced
summary: 普通电脑 + 平台 App + 双目摄像头的增强采集节点。
supported_platforms:
  - linux-x86_64
  - windows-x86_64
required_modules:
  - edge_core
  - edge_auth_binding
  - edge_upload_agent
  - edge_preview_packager
  - edge_capture_stereo
  - device_health
capture_modules:
  - edge_capture_usb
  - edge_capture_stereo
preview_modules:
  - edge_preview_packager
optional_modules:
  - local_ui
service_mode: user-process
install_backend_preference:
  - linux
  - windows
notes:
  - 适合增强数据层，不要求 Jetson 专有 AP / CSI / bridge。
  - 双目健康检查和标定应从本 profile 开始固化。

